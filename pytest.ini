[pytest]
# Test discovery
testpaths = tests

# Custom markers. The whole suite is offline by design — HTTP is mocked with
# recorded fixtures — so `pytest -q` needs no network. Any test that genuinely
# calls a live external API must be decorated @pytest.mark.network so CI can
# exclude it with `-m "not network"`.
markers =
    network: tests that call live external APIs (skipped in CI)
